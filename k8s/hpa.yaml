# ============================================================
# HPA：基于 CPU/内存利用率自动扩缩（需集群已装 metrics-server）
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: popop-tool
  namespace: fast-project
  labels:
    app: popop-tool
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: popop-tool
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
