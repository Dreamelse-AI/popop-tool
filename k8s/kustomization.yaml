# ============================================================
# 用 kustomize 聚合资源：kubectl apply -k k8s/
#
# secret.example.yaml 不纳入（避免误 apply 占位密钥）。
# 真实 Secret 用命令行单独创建（见 README）。
# ingress.yaml 不纳入（ALB 属基础设施，集群侧手动管理）。
# CI 会用 kustomize 覆盖镜像 tag。
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fast-project

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

images:
  - name: wjm20260616-registry.ap-northeast-1.cr.aliyuncs.com/popop-i18n-prod/fast-project/popop-tool
    newTag: latest

labels:
  - pairs:
      managed-by: kustomize
    includeSelectors: false
