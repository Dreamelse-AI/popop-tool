# ============================================================
# popop-tool 服务端 Deployment
# 前后端单进程：Express(3000) 同时托管前端 dist + /apimart 代理
# 运行时环境变量来自 ConfigMap(非敏感) 与 Secret(敏感：APIMART_API_KEY)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: popop-tool
  namespace: fast-project
  labels:
    app: popop-tool
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: popop-tool
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: popop-tool
    spec:
      imagePullSecrets:
        - name: publicimagesecret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: popop-tool
          image: wjm20260616-registry.ap-northeast-1.cr.aliyuncs.com/popop-i18n-prod/fast-project/popop-tool:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: popop-tool-config
            - secretRef:
                name: popop-tool-secrets
                optional: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
