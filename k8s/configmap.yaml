# ============================================================
# ConfigMap：非敏感运行时配置（可安全提交）
# APIMART_API_KEY 是敏感值，放 Secret（见 secret.example.yaml），不在此处
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: popop-tool-config
  namespace: fast-projects
  labels:
    app: popop-tool
data:
  NODE_ENV: "production"
  PORT: "3000"
  APIMART_API_TARGET: "https://api.apimart.ai"
