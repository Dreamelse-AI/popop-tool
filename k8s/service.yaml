# ============================================================
# Service：集群内暴露 Deployment，端口 3000 -> 容器 http(3000)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: popop-tool
  namespace: fast-projects
  labels:
    app: popop-tool
spec:
  type: ClusterIP
  selector:
    app: popop-tool
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
