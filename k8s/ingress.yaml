# ============================================================
# 阿里云 ALB Ingress
#
# ⚠️ 本文件【已从 kustomization.yaml 移出】，不由应用 CI 管理。
#   ALB Ingress 属基础设施，由集群侧手动维护，避免 CI apply 覆盖
#   ALB 的 class/注解/backend。此文件仅作 IaC 记录/参考。
#
# host 请替换为实际分配给 popop-tool 的域名。
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: popop-tool
  namespace: fast-project
  labels:
    app: popop-tool
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/backend-protocol: http
spec:
  rules:
    - host: tool.popop.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: popop-tool
                port:
                  number: 3000
