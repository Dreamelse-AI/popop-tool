# ============================================================
# VKE ALB Ingress（火山引擎应用型负载均衡）
#
# ⚠️ 本文件【已从 kustomization.yaml 移出】，不由应用 CI 管理。
#   ALB Ingress 属基础设施，由集群侧手动维护，避免 CI apply 覆盖
#   ALB 的 class/注解/backend。此文件仅作 IaC 记录/参考。
#
# host 请替换为实际分配给 popop-tool 的域名。
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: popop-tool
  namespace: fast-projects
  labels:
    app: popop-tool
  annotations:
    ingress.vke.volcengine.com/loadbalancer-protocol: http
    ingress.vke.volcengine.com/loadbalancer-backend-protocol: http
    ingress.vke.volcengine.com/loadbalancer-port: "80"
    ingress.vke.volcengine.com/loadbalancer-pass-through: "true"
    ingress.vke.volcengine.com/loadbalancer-scheduler: wrr
spec:
  rules:
    - host: popop.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: popop-tool
                port:
                  number: 3000
