# ============================================================
# Secret 模板（敏感凭据）—— 切勿把填好真实值的版本提交到 git！
#
# 推荐用命令行创建（避免明文进版本库）：
#   kubectl -n fast-projects create secret generic popop-tool-secrets \
#     --from-literal=APIMART_API_KEY='sk-xxxxx'
#
# 更佳实践：External Secrets / Sealed Secrets / 云厂商 KMS。
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: popop-tool-secrets
  namespace: fast-projects
  labels:
    app: popop-tool
type: Opaque
stringData:
  APIMART_API_KEY: "sk-your-apimart-key-here"
